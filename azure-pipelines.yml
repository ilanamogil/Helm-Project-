# Azure DevOps Pipeline (Exam Section 5.1)
#
# Mirrors the Jenkins pipeline: Linting + Security Scan run in parallel,
# then the Docker image is built and pushed to Docker Hub.
#
# Credentials are stored securely as pipeline variables / a variable group:
#   DOCKERHUB_USERNAME            (normal variable)
#   DOCKERHUB_PASSWORD            (mark as SECRET)
#
# Secret variables are never printed; they are mapped into the build step's
# environment and read from there.

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: '$(DOCKERHUB_USERNAME)/flask-aws-monitor'
  imageTag: '$(Build.BuildId)'

stages:
  - stage: Checks
    displayName: 'Lint & Security Scan (parallel)'
    jobs:
      # These two jobs have no dependsOn between them, so Azure runs them in parallel.
      - job: Lint
        displayName: 'Linting'
        steps:
          - script: |
              echo "===== Linting ====="
              if command -v flake8 >/dev/null 2>&1; then flake8 app.py || true; else echo "[mock] flake8 not installed - skipping Python lint"; fi
              if command -v hadolint >/dev/null 2>&1; then hadolint Dockerfile || true; else echo "[mock] hadolint not installed - skipping Dockerfile lint"; fi
              if command -v shellcheck >/dev/null 2>&1; then shellcheck *.sh 2>/dev/null || true; else echo "[mock] shellcheck not installed - skipping shell lint"; fi
            displayName: 'Run linters'

      - job: SecurityScan
        displayName: 'Security Scan'
        steps:
          - script: |
              echo "===== Security Scan ====="
              if command -v bandit >/dev/null 2>&1; then bandit -r app.py || true; else echo "[mock] bandit not installed - skipping Python security scan"; fi
              if command -v trivy >/dev/null 2>&1; then trivy fs --exit-code 0 --no-progress . || true; else echo "[mock] trivy not installed - skipping Trivy scan"; fi
            displayName: 'Run security scanners'

  - stage: BuildAndPush
    displayName: 'Build & Push image'
    dependsOn: Checks
    jobs:
      - job: BuildPush
        displayName: 'Docker build and push to Docker Hub'
        steps:
          - script: |
              echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
              docker build -t $(imageName):$(imageTag) -t $(imageName):latest .
              docker push $(imageName):$(imageTag)
              docker push $(imageName):latest
              docker logout
            displayName: 'Build and push'
            env:
              DOCKERHUB_USERNAME: $(DOCKERHUB_USERNAME)
              DOCKERHUB_PASSWORD: $(DOCKERHUB_PASSWORD)

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-aws-credentials
  labels:
    app: {{ .Release.Name }}-flask-aws-monitor
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "{{ .Values.aws.accessKeyId }}"
  AWS_SECRET_ACCESS_KEY: "{{ .Values.aws.secretAccessKey }}"

apiVersion: v1
kind: Service
metadata:
  name: flask-aws-monitor
  labels:
    app: flask-aws-monitor
spec:
  # LoadBalancer exposes the app externally for browser access.
  # Use NodePort instead if the cluster has no cloud load balancer.
  type: LoadBalancer
  selector:
    app: flask-aws-monitor
  ports:
    - name: http
      port: 5001
      targetPort: http
      protocol: TCP

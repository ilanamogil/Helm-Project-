apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-aws-monitor
  labels:
    app: flask-aws-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-aws-monitor
  template:
    metadata:
      labels:
        app: flask-aws-monitor
    spec:
      containers:
        - name: flask-aws-monitor
          # Replace with your own Docker Hub image if your username differs
          image: ilanamogil/flask-aws-monitor:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5001
          # AWS credentials are read from a Secret named "aws-credentials"
          # (created out-of-band, never committed). See k8s/README.md.
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
